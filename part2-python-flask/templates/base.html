<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Railway Trip Management{% endblock %}</title>
  <style>
    :root {
      --navy:  #1a365d;
      --blue:  #2b6cb0;
      --light: #ebf8ff;
      --red:   #e53e3e;
      --green: #276749;
      --gray:  #4a5568;
      --bg:    #f0f4f8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--gray); }

    /* ── NAV ── */
    nav {
      background: linear-gradient(135deg, var(--navy), var(--blue));
      padding: 0 30px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    nav .brand {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      padding: 16px 0;
      margin-right: auto;
      letter-spacing: .5px;
    }
    nav a {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      padding: 18px 16px;
      font-size: .9rem;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all .2s;
    }
    nav a:hover, nav a.active {
      color: #fff;
      border-bottom-color: #90cdf4;
      background: rgba(255,255,255,.08);
    }

    /* ── CONTENT ── */
    .container { max-width: 1100px; margin: 34px auto; padding: 0 20px; }

    /* ── CARDS ── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .card-header {
      background: linear-gradient(90deg, var(--light), #bee3f8);
      padding: 14px 22px;
      border-bottom: 2px solid #90cdf4;
    }
    .card-header h2 { color: #2c5282; font-size: 1.1rem; }
    .card-body { padding: 20px 22px; }

    /* ── TABLES ── */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead tr { background: #4a5568; color: #fff; }
    thead th { padding: 10px 14px; text-align: center; }
    tbody td { padding: 9px 14px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    tbody tr:hover { background: #f7fafc; }
    .vip td { color: #6b46c1; font-weight: 700; }

    /* ── FORMS ── */
    .filter-form {
      background: #fff;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      margin-bottom: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .filter-form label { display: block; font-size: .78rem; font-weight: 600; color: #718096; margin-bottom: 4px; }
    .filter-form select,
    .filter-form input {
      padding: 8px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: .88rem;
      outline: none;
      min-width: 150px;
      color: var(--gray);
    }
    .filter-form select:focus,
    .filter-form input:focus { border-color: var(--blue); }
    .btn {
      padding: 9px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 600;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-secondary { background: #e2e8f0; color: var(--gray); text-decoration: none; }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-blue   { background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; }
    .badge-green  { background: #f0fff4; color: var(--green); border: 1px solid #9ae6b4; }
    .badge-purple { background: #faf5ff; color: #6b46c1; border: 1px solid #d6bcfa; }
    .badge-red    { background: #fff5f5; color: var(--red); border: 1px solid #feb2b2; }
    .badge-gray   { background: #f7fafc; color: var(--gray); border: 1px solid #e2e8f0; }

    /* ── ALERTS ── */
    .alert {
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: .9rem;
    }
    .alert-info    { background: #ebf8ff; border-left: 4px solid var(--blue); color: #2c5282; }
    .alert-danger  { background: #fff5f5; border-left: 4px solid var(--red);  color: #c53030; }
    .alert-success { background: #f0fff4; border-left: 4px solid #48bb78;      color: var(--green); }

    /* ── STAT GRID ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-box {
      background: #fff;
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .stat-box .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--blue); }
    .stat-box .stat-label { font-size: .8rem; color: #718096; margin-top: 4px; }

    /* ── TRIP DETAIL ── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .detail-item label { font-size: .75rem; font-weight: 700; color: #718096; text-transform: uppercase; }
    .detail-item p { font-size: .95rem; font-weight: 600; color: var(--gray); margin-top: 2px; }

    footer { text-align: center; padding: 24px; font-size: .78rem; color: #a0aec0; }
  </style>
</head>
<body>

<nav>
  <span class="brand">🚆 Railway Trip Management</span>
  <a href="/"       class="{{ 'active' if request.endpoint == 'index'  }}">Home</a>
  <a href="/trips"  class="{{ 'active' if request.endpoint == 'trips'  }}">All Trips</a>
  <a href="/search" class="{{ 'active' if request.endpoint == 'search' }}">Search by Code</a>
  <a href="/stats"  class="{{ 'active' if request.endpoint == 'stats'  }}">Statistics</a>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<footer>UMBB – Faculty of Sciences | Module: L3 DSS | Railway Trip Management Project 2025/2026</footer>
</body>
</html>
